defaults:

  logdir: null
  traindir: null
  evaldir: null
  offline_traindir: ''
  offline_evaldir: ''
  seed: 0
  deterministic_run: False
  steps: 1e6
  parallel: False
  eval_every: 25000
  # eval_every_eps: 50
  eval_episode_num: 50
  log_every: 1e4
  reset_every: 0
  device: 'cuda:0'
  compile: True
  precision: 32
  debug: False
  video_pred_log: True
  eps: 7500
  eval_epochs: 32
  # Environment
  task: 'dmc_walker_walk'
  size: [64, 64]
  envs: 10
  MT: 10
  action_repeat: 2
  time_limit: 1000
  grayscale: False
  prefill: 25000
  reward_EMA: True
  with_cross_model_loss: True
  # Context
  ctx_encoder:
      symlog_inputs: False
      inputs: ["obs", "action"]
      crossmodal: True
      lambda_cross: 1.0

      input_permutation: False
      input_masking: 0.0
      network_type: transformer # transformer, gru or mlp
      representation_loss: fw # fw, inv or both
      mlp_opts: {hunits: 128, layers: 3, act: silu, norm: layer, outscale: 1.0, outnorm: True, winit: normal, fan: avg}
      gru_opts: {hunits: 128, linear: {act: silu, norm: layer, hunits: 128, winit: normal, outnorm: True}}
      attn_opts: {hunits: 128, heads: 1, linear: {act: silu, norm: layer, hunits: 128, winit: normal}}
      fw_opts: {hunits: 128, act: silu, layers: 2}
      inv_opts: {hunits: 128, act: silu, layers: 2}
      linear_ctx_out: {hunits: 8, act: silu, norm: layer, outscale: 1.0, outnorm: False, winit: normal, fan: avg}

  # Model
  dyn_hidden: 128
  dyn_deter: 512
  dyn_stoch: 32
  dyn_discrete: 32
  dyn_rec_depth: 1
  dyn_mean_act: 'none'
  dyn_std_act: 'sigmoid2'
  dyn_min_std: 0.1
  # grad_heads: ['decoder', 'reward', 'cont']
  grad_heads: ['reward']
  units: 128
  act: 'SiLU'
  norm: True
  encoder:
    {mlp_keys: '$^', cnn_keys: 'image', act: 'SiLU', norm: True, cnn_depth: 32, kernel_size: 4, minres: 4, mlp_layers: 5, mlp_units: 128, symlog_inputs: True}
  decoder:
    {mlp_keys: '$^', cnn_keys: 'image', act: 'SiLU', norm: True, cnn_depth: 32, kernel_size: 4, minres: 4, mlp_layers: 5, mlp_units: 128, cnn_sigmoid: False, image_dist: mse, vector_dist: symlog_mse, outscale: 1.0}
  actor:
    {layers: 2, dist: 'normal', entropy: 3e-4, unimix_ratio: 0.01, std: 'learned', min_std: 0.1, max_std: 1.0, temp: 0.1, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 1.0}
  critic:
    {layers: 2, dist: 'symlog_disc', slow_target: True, slow_target_update: 1, slow_target_fraction: 0.02, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 0.0}
  reward_head:
    {layers: 2, dist: 'symlog_disc', loss_scale: 1.0, outscale: 0.0}
  cont_head:
    {layers: 2, loss_scale: 1.0, outscale: 1.0}
  PPO:
    {clip_eps: 0.2, lr: 3e-4}
  dyn_scale: 0.5
  rep_scale: 0.1
  kl_free: 1.0
  weight_decay: 0.0
  unimix_ratio: 0.01
  initial: 'learned'

  # Training
  # MT10 batch_size: 50 batch_length: 96 envs_para: 5
  # MT50 batch_size: 100 batch_length: 64 envs_para: 1
  batch_size: 50 #50 # 10*32
  batch_length: 64 # 96
  train_ratio: 512
  pretrain: 100
  model_lr: 1e-4
  opt_eps: 1e-8
  grad_clip: 1000
  dataset_size: 10000000
  opt: 'adam'

  # Behavior.
  discount: 0.997
  discount_lambda: 0.95
  imag_horizon: 15
  imag_gradient: 'dynamics'
  imag_gradient_mix: 0.0
  eval_state_mean: False

  # Exploration
  expl_behavior: 'greedy'
  expl_until: 0
  expl_extr_scale: 0.0
  expl_intr_scale: 1.0
  disag_target: 'stoch'
  disag_log: True
  disag_models: 10
  disag_offset: 1
  disag_layers: 4
  disag_units: 400
  disag_action_cond: False

MW:
  steps: 5e6
  time_limit: 500
  action_repeat: 1
  envs_para: 5 # MT10 5 MT50 1
  train_ratio: 512
  video_pred_log: false
  encoder: {mlp_keys: '.*', cnn_keys: '$^', mlp_units: 128, mlp_layers: 3}
  decoder: {mlp_keys: '.*', cnn_keys: '$^', mlp_units: 128, mlp_layers: 3}

HC:
  steps: 1e7
  action_repeat: 1
  envs: 4
  train_ratio: 512
  video_pred_log: false
  encoder: {mlp_keys: '.*', cnn_keys: '$^'}
  decoder: {mlp_keys: '.*', cnn_keys: '$^'}

debug:
  debug: True
  pretrain: 1
  prefill: 1
  batch_size: 10
  batch_length: 20
